<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>InnoSphere</title>
    <script>
      // GitHub Pages SPA redirect trick
      // When a 404 happens (e.g. refresh on /submit-event),
      // redirect to index.html with the path encoded as a query string.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>

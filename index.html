<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InnoSphere – Student Project Showcase</title>
    <meta name="description" content="Discover innovative student engineering projects across all departments."/>
    <!-- GitHub Pages SPA: restore path from 404 redirect -->
    <script>
      (function(){
        var r = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (r && r !== location.href) {
          history.replaceState(null, null, r);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
